{% extends "base.html" %}
{% load static %}

{% block head_extra %}
    <title>{{ pdf_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* The viewer has its own styling, but we can set the container size */
        #viewer-container {
            width: 100%;
            height: 90vh; /* 90% of the viewport height */
            max-width: 900px;
            margin: 20px auto;
            border: 1px solid #ccc;
        }
    </style>
{% endblock %}

{% block content %}

<!-- 1. The container where the PDF viewer will be rendered -->
<div id="viewer-container"></div>

<!-- 2. Load the PDF Viewer library from its CDN -->
<script src="https://unpkg.com/pdf-generator-api-pdfviewer@latest/dist/PDFViewer.iife.js"></script>

<script>
    // 3. Get the PDFViewer class from the global object
    const { PDFViewer } = PDFGeneratorApi;

    // 4. Initialize the viewer
    const viewer = new PDFViewer({
        container: document.getElementById("viewer-container")
    });

    // 5. The Magic: Load the PDF using the URL generated by Django's static tag
    const pdfUrl = "{% static pdf_path %}";
    viewer.loadUrl(pdfUrl);
</script>

{% endblock %}
