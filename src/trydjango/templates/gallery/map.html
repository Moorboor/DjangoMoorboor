{% extends "base.html" %}
{% load static %} 
{% block content %}

<link rel="stylesheet" type="text/css" href="{% static 'map/style.css' %}">




<div id="map"></div>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script> 
<script type="module">
  (async () => {
    const products = await fetch('/api/artworks/').then(r => r.json());

    const map = L.map('map')   // you can change the zoom
      // Satellite imagery (base)
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        attribution:
          'Tiles &copy; Esri — Source: Esri, Maxar, Earthstar Geographics, CNES/Airbus DS, USDA, USGS, AeroGRID, IGN',
        maxZoom: 19
      }
    ).addTo(map);

    // Labels overlay (names/roads/places on top of satellite)
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      {
        attribution: 'Labels &copy; Esri',
        maxZoom: 19
      }
    ).addTo(map);
        
    for (const p of products) {
        const coords = p.geocoor.split(",");

        const popupContent = `
        <div class="popup" style="background-color: black; color: white; padding: 10px;">
            <h3> <a href="${p.url}">${p.title}</a> </h3>
            <img src="${p.image_url}" alt="${p.title}" style="width: 150px;">
           
          </div>
        `;
        L.marker([coords[0], coords[1]])
        .addTo(map)
        .bindPopup(popupContent)
        .openPopup();
    }
    map.setView([0, 0], 2);
})();
</script> 
{% endblock content %}
